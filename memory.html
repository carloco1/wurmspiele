<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧠 Memory</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #fff176 0%, #ffb74d 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .screen { display: none; width: 100%; max-width: 700px; text-align: center; }
    .screen.active { display: block; }

    /* Startbildschirm */
    h1 { font-size: 3rem; margin-bottom: 12px; }
    p  { font-size: 1.2rem; margin-bottom: 24px; color: #555; }

    .difficulty-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 16px;
      padding: 18px 28px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      line-height: 1.6;
    }
    .btn:hover  { transform: translateY(-3px); box-shadow: 0 6px 14px rgba(0,0,0,0.25); }
    .btn:active { transform: translateY(0);    box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
    .btn:focus  { outline: 3px solid rgba(0,0,0,0.3); outline-offset: 2px; }

    .btn-easy   { background: #66bb6a; color: #fff; }
    .btn-medium { background: #42a5f5; color: #fff; }
    .btn-hard   { background: #ef5350; color: #fff; }
    .btn-small  { background: #bdbdbd; color: #333; padding: 8px 16px; font-size: 0.9rem; border-radius: 10px; }

    /* Spielfeld */
    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.5);
      border-radius: 12px;
    }
    #move-counter { font-size: 1.4rem; font-weight: bold; }

    .card-grid {
      display: grid;
      gap: 10px;
      justify-content: center;
    }

    /* Gewinn-Screen */
    .win-box {
      background: rgba(255,255,255,0.7);
      border-radius: 24px;
      padding: 40px;
      display: inline-block;
    }
    .confetti { font-size: 4rem; margin-bottom: 8px; }
    h2 { font-size: 2.5rem; margin-bottom: 12px; }
    #win-message { font-size: 1.3rem; margin-bottom: 24px; color: #444; }

    /* Karten */
    .card {
      width: 80px;
      height: 80px;
      perspective: 600px;
      cursor: pointer;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s ease;
      border-radius: 12px;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    }

    .card-back {
      background: linear-gradient(135deg, #5c6bc0 0%, #ab47bc 100%);
      color: white;
      font-size: 1.8rem;
    }

    .card-front {
      background: #fff;
      transform: rotateY(180deg);
    }

    .card.matched .card-inner {
      box-shadow: 0 0 0 3px #66bb6a, 0 3px 8px rgba(0,0,0,0.2);
    }

    .card.matched { cursor: default; opacity: 0.85; }

    /* Setup-Screen */
    .setup-step { display: none; }
    .setup-step.active { display: block; }

    .player-count-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .name-input {
      font-size: 1.2rem;
      padding: 10px 16px;
      border: 3px solid #ddd;
      border-radius: 12px;
      text-align: center;
      width: 220px;
      margin-bottom: 8px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    .name-input:focus { outline: none; border-color: #42a5f5; }
    .name-input.error { border-color: #ef5350; }

    .gender-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 16px;
    }

    .btn-boy  { background: #42a5f5; color: #fff; }
    .btn-girl { background: #e91e8c; color: #fff; }

    /* Spielfeld — Spieler-Badges */
    .player-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .player-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border-radius: 20px;
      background: #ddd;
      color: #666;
      font-weight: bold;
      font-size: 0.9rem;
      transition: transform 0.2s, background 0.2s, color 0.2s;
    }

    .player-badge.active {
      color: #fff;
      transform: scale(1.05);
    }

    /* Gewinn-Screen */
    .winner-name {
      font-size: 2rem;
      font-weight: bold;
      margin: 12px 0;
      animation: pulse 0.8s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1);    }
      to   { transform: scale(1.08); }
    }

    .ranking-list {
      list-style: none;
      margin: 16px 0 24px;
      text-align: left;
      display: inline-block;
    }

    .ranking-list li { font-size: 1.2rem; padding: 6px 0; }
  </style>
</head>
<body>

  <!-- Startbildschirm -->
  <div id="screen-start" class="screen active">
    <h1>🧠 Memory</h1>
    <p>Das klassische Kartenspiel für die ganze Familie!</p>
    <div class="difficulty-buttons">
      <button onclick="showScreen('screen-setup')" class="btn btn-easy">🎮 Los geht's!</button>
    </div>
  </div>

  <!-- Setup-Screen -->
  <div id="screen-setup" class="screen">
    <div id="setup-step1" class="setup-step active">
      <h1>👥 Spieler</h1>
      <p>Wie viele Spieler spielen mit?</p>
      <div class="player-count-buttons">
        <button onclick="selectPlayerCount(2)" class="btn btn-medium">2</button>
        <button onclick="selectPlayerCount(3)" class="btn btn-medium">3</button>
        <button onclick="selectPlayerCount(4)" class="btn btn-medium">4</button>
        <button onclick="selectPlayerCount(5)" class="btn btn-medium">5</button>
        <button onclick="selectPlayerCount(6)" class="btn btn-medium">6</button>
      </div>
    </div>
    <div id="setup-step2" class="setup-step">
      <h1 id="setup-player-title">Spieler 1 einrichten</h1>
      <p>Wie heißt du?</p>
      <input id="player-name-input" class="name-input" type="text" maxlength="12" placeholder="Name eingeben" />
      <p>Bist du ein...?</p>
      <div class="gender-buttons">
        <button onclick="selectGender('boy')"  class="btn btn-boy">👦 Junge</button>
        <button onclick="selectGender('girl')" class="btn btn-girl">👧 Mädchen</button>
      </div>
    </div>
  </div>

  <!-- Schwierigkeits-Screen -->
  <div id="screen-difficulty" class="screen">
    <h1>🧠 Memory</h1>
    <p>Wähle eine Schwierigkeitsstufe:</p>
    <div class="difficulty-buttons">
      <button onclick="startGame(8, 4, 4)"  class="btn btn-easy">🌱 Leicht<br><small>8 Paare · 4×4</small></button>
      <button onclick="startGame(12, 4, 6)" class="btn btn-medium">🌿 Mittel<br><small>12 Paare · 4×6</small></button>
      <button onclick="startGame(18, 6, 6)" class="btn btn-hard">🌳 Schwer<br><small>18 Paare · 6×6</small></button>
    </div>
  </div>

  <!-- Spielfeld -->
  <div id="screen-game" class="screen">
    <div class="game-header">
      <div id="player-badges" class="player-badges"></div>
      <span id="move-counter">Züge: 0</span>
      <button onclick="resetToStart()" class="btn btn-small">↩ Neu</button>
    </div>
    <div id="card-grid" class="card-grid"></div>
  </div>

  <!-- Gewinn-Screen -->
  <div id="screen-win" class="screen">
    <div class="win-box">
      <div class="confetti">🎉🏆🎉</div>
      <div id="winner-display"></div>
      <ul id="ranking-list" class="ranking-list"></ul>
      <button onclick="resetToStart()" class="btn btn-easy">🔄 Nochmal spielen</button>
    </div>
  </div>

  <script>
    const EMOJIS = [
      // Tiere
      '🐶','🐱','🐸','🦊','🐼','🦁','🐯','🦋','🐢','🦜',
      // Pflanzen
      '🌻','🌵','🌴','🍀','🌸','🍄','🌿','🌺','🌲','🎋',
      // Dinge
      '🚗','🎈','🎸','🎺','⚽','🎮','🚀','🌈','🎨','🏆'
    ];

    const state = {
      moves: 0,
      flippedCards: [],
      matchedPairs: 0,
      totalPairs: 0,
      locked: false,
      cols: 4,
      rows: 4,
      players: [],
      currentPlayerIndex: 0
    };

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function resetToStart() {
      state.moves = 0;
      state.flippedCards = [];
      state.matchedPairs = 0;
      state.locked = false;
      document.getElementById('card-grid').innerHTML = '';
      showScreen('screen-start');
    }

    let pendingPlayerCount = 0;
    let currentSetupIndex  = 0;

    function selectPlayerCount(count) {
      pendingPlayerCount = count;
      currentSetupIndex  = 0;
      state.players      = [];
      document.getElementById('setup-step1').classList.remove('active');
      document.getElementById('setup-step2').classList.add('active');
      document.getElementById('setup-player-title').textContent = 'Spieler 1 einrichten';
      const input = document.getElementById('player-name-input');
      input.value = '';
      input.classList.remove('error');
      input.focus();
    }

    function selectGender(gender) {
      const input = document.getElementById('player-name-input');
      const name  = input.value.trim();
      if (!name) {
        input.classList.add('error');
        input.focus();
        return;
      }
      input.classList.remove('error');

      const color = gender === 'boy' ? '#42a5f5' : '#e91e8c';
      const icon  = gender === 'boy' ? '👦' : '👧';
      state.players.push({ name, gender, icon, color, score: 0 });

      currentSetupIndex++;
      if (currentSetupIndex < pendingPlayerCount) {
        document.getElementById('setup-player-title').textContent =
          `Spieler ${currentSetupIndex + 1} einrichten`;
        input.value = '';
        input.focus();
      } else {
        showScreen('screen-difficulty');
      }
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function startGame(pairs, cols, rows) {
      state.moves = 0;
      state.flippedCards = [];
      state.matchedPairs = 0;
      state.totalPairs = pairs;
      state.locked = false;
      state.cols = cols;
      state.rows = rows;
      state.currentPlayerIndex = 0;
      state.players.forEach(p => { p.score = 0; });

      document.getElementById('move-counter').textContent = 'Züge: 0';

      renderPlayerBadges();

      const chosen = shuffle([...EMOJIS]).slice(0, pairs);
      const cards  = shuffle([...chosen, ...chosen]);

      renderCards(cards, cols);
      showScreen('screen-game');
    }

    function renderPlayerBadges() {
      const container = document.getElementById('player-badges');
      container.innerHTML = '';
      state.players.forEach((player, i) => {
        const badge = document.createElement('div');
        badge.className = 'player-badge' + (i === state.currentPlayerIndex ? ' active' : '');
        badge.id = `badge-${i}`;
        if (i === state.currentPlayerIndex) badge.style.background = player.color;
        badge.textContent = `${player.icon} ${player.name} 0`;
        container.appendChild(badge);
      });
    }

    function updatePlayerBadges() {
      state.players.forEach((player, i) => {
        const badge = document.getElementById(`badge-${i}`);
        if (!badge) return;
        const isActive = i === state.currentPlayerIndex;
        badge.className = 'player-badge' + (isActive ? ' active' : '');
        badge.style.background = isActive ? player.color : '';
        badge.textContent = `${player.icon} ${player.name} ${player.score}`;
      });
    }

    function renderCards(cards, cols) {
      const grid = document.getElementById('card-grid');
      grid.innerHTML = '';
      grid.style.gridTemplateColumns = `repeat(${cols}, 80px)`;

      cards.forEach((emoji, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.emoji = emoji;
        card.dataset.index = index;
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-back">❓</div>
            <div class="card-front">${emoji}</div>
          </div>`;
        card.addEventListener('click', onCardClick);
        grid.appendChild(card);
      });
    }

    function onCardClick(event) {
      if (state.locked) return;

      const card = event.currentTarget;
      if (card.classList.contains('flipped')) return;
      if (card.classList.contains('matched')) return;

      card.classList.add('flipped');
      state.flippedCards.push(card);

      if (state.flippedCards.length === 2) {
        state.moves++;
        document.getElementById('move-counter').textContent = `Züge: ${state.moves}`;
        checkMatch();
      }
    }

    function checkMatch() {
      const [a, b] = state.flippedCards;

      if (a.dataset.emoji === b.dataset.emoji) {
        a.classList.add('matched');
        b.classList.add('matched');
        state.matchedPairs++;
        state.flippedCards = [];

        if (state.matchedPairs === state.totalPairs) {
          setTimeout(showWin, 600);
        }
      } else {
        state.locked = true;
        setTimeout(() => {
          a.classList.remove('flipped');
          b.classList.remove('flipped');
          state.flippedCards = [];
          state.locked = false;
        }, 1000);
      }
    }

    function showWin() {
      const msg = state.moves === 1
        ? 'Du hast nur 1 Zug gebraucht! Unglaublich! 🤩'
        : `Du hast ${state.moves} Züge gebraucht!`;
      document.getElementById('win-message').textContent = msg;
      showScreen('screen-win');
    }
  </script>
</body>
</html>
